repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.3.0 # <-- security fix for PYSEC-2024-48
    hooks:
      - id: black
        args: [] # don't override line length, pyproject.toml will be used

  - repo: local
    hooks:
      - id: sync-claude-md
        name: Sync CLAUDE.md generated sections
        entry: python _ai/scripts/sync_claude_md.py --check
        language: python
        pass_filenames: false
        files: ^requirements\.txt$
        always_run: false

      - id: guard-claude-md
        name: CLAUDE.md freshness guard
        entry: python _ai/scripts/guard_claude_md.py
        language: python
        pass_filenames: false
        always_run: true
