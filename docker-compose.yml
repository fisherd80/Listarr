services:
  listarr:
    build: .
    container_name: listarr
    ports:
      - "5000:5000"
    user: root  # Start as root so entrypoint can fix bind-mount permissions, then drops to listarr
    volumes:
      - ./instance:/app/instance  # Bind mount - entrypoint fixes permissions
    environment:
      - TZ=UTC                    # Server timezone for cron schedule interpretation
      - LOG_LEVEL=INFO            # Python logging level (DEBUG, INFO, WARNING, ERROR)
      - FLASK_DEBUG=false
      # SECRET_KEY auto-generated to instance/.secret_key on first run
      # LISTARR_SECRET_KEY=your_override_here  # Optional override
      # SECURE_COOKIES=true  # Enable when serving over HTTPS (reverse proxy)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:5000/health', timeout=5); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
