name: Listarr – Develop CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  FLASK_ENV: testing
  DATABASE_URL: "sqlite:///:memory:"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  ci:
    name: Lint • Test • Security • Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run unit tests
        run: pytest --cov=listarr --cov-report=term-missing

      - name: Dependency vulnerability scan
        run: pip-audit

      - name: Security scan (bandit)
        run: bandit -r listarr -ll

      - name: Docker build validation (no push)
        run: docker build -t listarr:ci .
