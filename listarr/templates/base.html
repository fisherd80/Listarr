<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='favicon.jpg') }}"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />

    <title>{% block title %}Listarr{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "media",
        theme: {
          extend: {
            colors: {
              primary: "#4F46E5",
              secondary: "#10B981",
            },
          },
        },
      };
    </script>

    <!-- Shared Toast Notification System -->
    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>

    {% block head %}{% endblock %}
  </head>

  <body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
    <!-- Top Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <!-- Left side: Logo + Main Links -->
          <div class="flex items-center space-x-6">
            <!-- Logo / Site Name -->
            <div class="flex-shrink-0 text-2xl font-bold text-primary">
              Listarr
            </div>

            <!-- Main links -->
            <div class="flex space-x-4">
              <a
                href="{{ url_for('main.dashboard_page') }}"
                class="px-3 py-2 rounded-md text-sm font-medium {% if request.endpoint == 'main.dashboard_page' %}bg-primary text-white{% else %}text-gray-700 dark:text-gray-200 hover:text-primary{% endif %}"
              >
                Dashboard
              </a>
              <a
                href="{{ url_for('main.lists_page') }}"
                class="px-3 py-2 rounded-md text-sm font-medium {% if request.endpoint == 'main.lists_page' %}bg-primary text-white{% else %}text-gray-700 dark:text-gray-200 hover:text-primary{% endif %}"
              >
                Lists
              </a>
              <a
                href="{{ url_for('main.jobs_page') }}"
                class="px-3 py-2 rounded-md text-sm font-medium {% if request.endpoint == 'main.jobs_page' %}bg-primary text-white{% else %}text-gray-700 dark:text-gray-200 hover:text-primary{% endif %}"
              >
                Jobs
              </a>
              <a
                href="{{ url_for('main.config_page') }}"
                class="px-3 py-2 rounded-md text-sm font-medium {% if request.endpoint == 'main.config_page' %}bg-primary text-white{% else %}text-gray-700 dark:text-gray-200 hover:text-primary{% endif %}"
              >
                Config
              </a>
            </div>
          </div>

          <!-- Right side: Settings -->
          <div class="flex items-center">
            <a
              href="{{ url_for('main.settings_page') }}"
              class="px-3 py-2 rounded-md text-sm font-medium {% if request.endpoint == 'main.settings_page' %}bg-primary text-white{% else %}text-gray-700 dark:text-gray-200 hover:text-primary{% endif %}"
            >
              Settings
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Toast Container (shared by Flask flash and JS toasts) -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div
        class="flash-toast flex items-center p-4 rounded-lg border shadow-lg max-w-md transition-all duration-300 {% if category == 'success' %}bg-green-100 dark:bg-green-900 border-green-200 dark:border-green-800{% elif category == 'warning' %}bg-yellow-100 dark:bg-yellow-900 border-yellow-200 dark:border-yellow-800{% elif category == 'error' %}bg-red-100 dark:bg-red-900 border-red-200 dark:border-red-800{% else %}bg-blue-100 dark:bg-blue-900 border-blue-200 dark:border-blue-800{% endif %}"
      >
        <svg class="w-5 h-5 mr-3 flex-shrink-0 {% if category == 'success' %}text-green-500 dark:text-green-400{% elif category == 'warning' %}text-yellow-500 dark:text-yellow-400{% elif category == 'error' %}text-red-500 dark:text-red-400{% else %}text-blue-500 dark:text-blue-400{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          {% if category == 'success' %}
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          {% elif category == 'warning' %}
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          {% elif category == 'error' %}
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          {% else %}
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          {% endif %}
        </svg>
        <span class="text-sm font-medium {% if category == 'success' %}text-green-800 dark:text-green-200{% elif category == 'warning' %}text-yellow-800 dark:text-yellow-200{% elif category == 'error' %}text-red-800 dark:text-red-200{% else %}text-blue-800 dark:text-blue-200{% endif %}">{{ message }}</span>
      </div>
      {% endfor %}
      {% endwith %}
    </div>
    <script>
      // Auto-dismiss flash messages after 3 seconds
      document.querySelectorAll('.flash-toast').forEach((toast, index) => {
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(100%)';
          setTimeout(() => toast.remove(), 300);
        }, 3000 + (index * 200));
      });
    </script>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer
      class="bg-white dark:bg-gray-800 text-center text-sm py-4 text-gray-500 dark:text-gray-400"
    >
      © 2025 Listarr
    </footer>
  </body>
</html>
