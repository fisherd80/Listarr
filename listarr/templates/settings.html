{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
  <h1 class="text-2xl font-bold text-white mb-6">Settings</h1>
  <!-- Tab navigation -->
  <div class="border-b border-gray-700 mb-6">
    <nav class="flex space-x-6" id="settings-tabs">
      <button class="settings-tab pb-2 border-b-2 border-blue-500 text-white text-sm font-medium" data-tab="integrations">Integrations</button>
      <button class="settings-tab pb-2 border-b-2 border-transparent text-gray-400 hover:text-white text-sm font-medium" data-tab="tmdb">TMDB</button>
      <button class="settings-tab pb-2 border-b-2 border-transparent text-gray-400 hover:text-white text-sm font-medium" data-tab="general">General</button>
      <button class="settings-tab pb-2 border-b-2 border-transparent text-gray-400 hover:text-white text-sm font-medium" data-tab="account">Account</button>
    </nav>
  </div>
  <!-- Tab panels -->
  <div id="tab-integrations" class="settings-panel">
    <div class="bg-gray-800 border border-gray-700 rounded p-8 text-center">
      <p class="text-gray-400">Integrations settings coming soon.</p>
    </div>
  </div>
  <div id="tab-tmdb" class="settings-panel hidden">
    <div class="bg-gray-800 border border-gray-700 rounded p-8 text-center">
      <p class="text-gray-400">TMDB settings coming soon.</p>
    </div>
  </div>
  <div id="tab-general" class="settings-panel hidden">
    <div class="bg-gray-800 border border-gray-700 rounded p-8 text-center">
      <p class="text-gray-400">General settings coming soon.</p>
    </div>
  </div>
  <div id="tab-account" class="settings-panel hidden">
    <div class="bg-gray-800 border border-gray-700 rounded p-8 text-center">
      <p class="text-gray-400">Account settings coming soon.</p>
    </div>
  </div>
  <script>
    document.querySelectorAll('.settings-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.settings-tab').forEach(t => {
          t.classList.remove('border-blue-500', 'text-white');
          t.classList.add('border-transparent', 'text-gray-400');
        });
        tab.classList.add('border-blue-500', 'text-white');
        tab.classList.remove('border-transparent', 'text-gray-400');
        document.querySelectorAll('.settings-panel').forEach(p => p.classList.add('hidden'));
        document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
      });
    });
  </script>
</div>
{% endblock %}
